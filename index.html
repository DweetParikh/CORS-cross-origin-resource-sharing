<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.6/axios.min.js"></script>
    <title>Frontend</title>
</head>
<body>
    <input id="a" type="text" placeholder="First Input"></input>
    <input id="b" type="text" placeholder="Second Input"></input>
    <button onclick="sendRequest()">Find Sum</button>\
    <p id="result"></p>

    <script>
        async function sendRequest() {
            const response = await axios.post("http://localhost:3000/sum", {
                a: document.getElementById("a").value,
                b: document.getElementById("b").value
            });
            document.getElementById("result").innerHTML = response.data.answer;
        }
    </script>
</body>
</html>
